name: tryzeon
description: "Tryzeon — virtual try-on and wardrobe management for fashion lovers."
publish_to: 'none'
version: 1.1.0+1
environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  smooth_page_indicator: ^2.0.1
  image_picker: ^1.0.4
  adaptive_platform_ui: ^0.1.95
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.0.0
  go_router: ^17.1.0
  flutter_markdown: ^0.7.4
  flutter_svg: ^2.0.10
  url_launcher: ^6.2.1
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  gal: ^2.3.2
  google_fonts: ^8.0.2
  flutter_cache_manager: ^3.4.1
  flutter_image_compress: ^2.4.0
  mime: ^2.0.0

  path: ^1.9.1
  typed_result: ^2.0.0
  cached_network_image: ^3.4.1
  hooks_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0
  flutter_hooks: ^0.21.3+1
  talker_flutter: ^5.1.9
  equatable: ^2.0.8
  sign_in_with_apple: ^7.0.1
  google_sign_in: ^7.2.0
  flutter_facebook_auth: ^7.1.5
  crypto: ^3.0.3
  isar_community: ^3.3.0
  isar_community_flutter_libs: ^3.3.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  skeletonizer: ^2.1.2
  toastification: ^3.0.3
  visibility_detector: ^0.4.0+2
  image_cropper: ^12.1.1
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0
  auto_mappr_annotation: ^2.3.0
  package_info_plus: ^9.0.0
  adaptive_dialog: ^2.6.0
  envied: ^1.3.3
  video_player: ^2.11.1
  share_plus: ^12.0.1
  firebase_core: ^4.5.0
  firebase_crashlytics: ^5.0.8
  firebase_analytics: ^12.1.3
  purchases_flutter: ^9.15.1
  purchases_ui_flutter: ^9.15.1
  dio: ^5.9.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  isar_community_generator: ^3.3.0
  riverpod_generator: ^4.0.0
  build_runner: ^2.7.1
  freezed: ^3.2.3
  json_serializable: ^6.8.0
  auto_mappr: ^2.10.0
  envied_generator: ^1.3.1

dependency_overrides:
  test_api: 0.7.10
  matcher: 0.12.19

flutter:
  assets:
    - assets/images/onboarding/
    - assets/images/profile/
    - assets/images/logo/
    - assets/images/tryon/
    - assets/images/ads/

  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo/tryzeon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo/tryzeon.png"
