name: Beta Build - iOS

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version for this TestFlight train, for example 1.2.0
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-and-deploy-ios-beta:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.1'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Calculate CocoaPods Key
        id: compute-pods-key
        run: echo "key=${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}" >> $GITHUB_OUTPUT

      - name: Restore CocoaPods cache
        id: cache-pods
        uses: actions/cache/restore@v5
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ steps.compute-pods-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "REVENUE_CAT_API_KEY=${{ secrets.REVENUE_CAT_APPLE_API_KEY }}" >> .env

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Save CocoaPods cache
        if: steps.cache-pods.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ steps.compute-pods-key.outputs.key }}

      - name: Install Bundle
        run: |
          cd ios
          bundle install

      - name: Setup SSH for match
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MATCH_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Install FlutterFire CLI
        run: dart pub global activate flutterfire_cli

      - name: Build and deploy to TestFlight
        run: |
          cd ios
          bundle exec fastlane beta
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_CONTENT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
