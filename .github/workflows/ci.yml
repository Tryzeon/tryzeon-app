name: CI - Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────
# Pipeline:
#   analyze (Linux) → build-android (Linux)
#                   → build-ios     (macOS)
#
# Cache strategy:
#   Gradle → save on main only
#   Flutter SDK / Pub  → managed by subosito/flutter-action
# ─────────────────────────────────────────────────────

jobs:
  # ════════════════════════════════════════════════════
  # Job 1: Platform-independent checks (Linux)
  # ════════════════════════════════════════════════════
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=https://placeholder.supabase.co" > .env
          echo "SUPABASE_ANON_KEY=placeholder" >> .env

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze Dart
        run: dart analyze

  # ════════════════════════════════════════════════════
  # Job 2: Android build (Linux)
  # ════════════════════════════════════════════════════
  build-android:
    name: Build Android
    needs: [analyze]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Calculate Gradle Key
        id: compute-gradle-key
        run: echo "key=${{ runner.os }}-gradle-${{ hashFiles('android/build.gradle.kts', 'android/app/build.gradle.kts', 'android/settings.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties', 'pubspec.lock') }}" >> $GITHUB_OUTPUT

      - name: Restore Gradle cache
        id: cache-gradle
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ steps.compute-gradle-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=https://placeholder.supabase.co" > .env
          echo "SUPABASE_ANON_KEY=placeholder" >> .env

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Save Gradle cache
        if: github.ref == 'refs/heads/main' && steps.cache-gradle.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ steps.compute-gradle-key.outputs.key }}

  # ════════════════════════════════════════════════════
  # Job 3: iOS build (macOS)
  # ════════════════════════════════════════════════════
  build-ios:
    name: Build iOS
    needs: [analyze]
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.1'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Calculate CocoaPods Key
        id: compute-pods-key
        run: echo "key=${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}" >> $GITHUB_OUTPUT

      - name: Restore CocoaPods cache
        id: cache-pods
        uses: actions/cache/restore@v5
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ steps.compute-pods-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=https://placeholder.supabase.co" > .env
          echo "SUPABASE_ANON_KEY=placeholder" >> .env

      - name: Install FlutterFire CLI
        run: dart pub global activate flutterfire_cli

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS (debug, no codesign)
        run: flutter build ios --debug --no-codesign

      - name: Save CocoaPods cache
        if: github.ref == 'refs/heads/main' && steps.cache-pods.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ steps.compute-pods-key.outputs.key }}

